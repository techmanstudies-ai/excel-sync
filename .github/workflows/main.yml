name: Excel Sync

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Sync
        run: python sync.py
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          PENPEC_TENANT_ID: ${{ secrets.PENPEC_TENANT_ID }}
          PENPEC_CLIENT_ID: ${{ secrets.PENPEC_CLIENT_ID }}
          PENPEC_CLIENT_SECRET: ${{ secrets.PENPEC_CLIENT_SECRET }}
          PENPEC_USER_EMAIL: ${{ secrets.PENPEC_USER_EMAIL }}
          ESBFILE_ID: ${{ secrets.ESBFILE_ID }}
          ESBGOOGLE_SHEET_ID: ${{ secrets.ESBGOOGLE_SHEET_ID }}
          FILE_ID: ${{ secrets.FILE_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          CFIS_FILE_ID: ${{ secrets.CFIS_FILE_ID }}
          LUBRICANT_FILE_ID: ${{ secrets.LUBRICANT_FILE_ID }}
          INCENTIVE_FILE_ID: ${{ secrets.INCENTIVE_FILE_ID }}
          FUEL_FILE_ID: ${{ secrets.FUEL_FILE_ID }}
          AGING_FILE_ID: ${{ secrets.AGING_FILE_ID }}
          PENPEC_GOOGLE_SHEET_ID: ${{ secrets.PENPEC_GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Save last sync state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_sync_esb.txt
          git add last_sync_test.txt
          git add last_sync_CFIS.txt
          git add last_sync_LUBRICANT.txt
          git add last_sync_INCENTIVE.txt
          git add last_sync_FUEL.txt
          git add last_sync_AGING.txt
          git commit -m "Update last sync time" || echo "No changes to commit"
          git push
